<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal</title>
  <meta name="description" content="Signal.">
  <meta property="og:title" content="Signal">
  <meta property="og:description" content="Signal.">
  <meta property="og:image" content="assets/capital-tile.svg">
  <style>
    :root {
      --bg: #11130f;
      --bg-deep: #090a08;
      --ink: #eff1e7;
      --muted: #83887b;
      --signal: #d8ff38;
      --warn: #c03221;
      --steel: #5f6d69;
      --line: rgba(239, 241, 231, 0.14);
      --glass: rgba(239, 241, 231, 0.055);
      --glass-strong: rgba(239, 241, 231, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      background:
        radial-gradient(circle at 50% 43%, rgba(216, 255, 56, 0.12), transparent 23rem),
        radial-gradient(circle at 78% 15%, rgba(192, 50, 33, 0.12), transparent 20rem),
        linear-gradient(145deg, #171a14 0%, var(--bg) 44%, var(--bg-deep) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.38;
      background:
        linear-gradient(90deg, rgba(239, 241, 231, 0.08) 1px, transparent 1px),
        linear-gradient(180deg, rgba(239, 241, 231, 0.055) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at 50% 42%, black, transparent 72%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.035),
        rgba(255, 255, 255, 0.01) 44%,
        rgba(0, 0, 0, 0.18)
      );
      mix-blend-mode: soft-light;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .site {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: clamp(22px, 4vw, 44px);
    }

    .masthead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
    }

    .identity {
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: clamp(48px, 6vw, 68px);
      height: clamp(48px, 6vw, 68px);
      filter: drop-shadow(0 0 24px rgba(216, 255, 56, 0.24));
    }

    .wordmark {
      margin: 0;
      color: var(--ink);
      font-size: clamp(2.2rem, 6vw, 5.4rem);
      line-height: 0.9;
      font-weight: 900;
      letter-spacing: 0;
    }

    .field {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 28px 0;
    }

    .grid {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      grid-auto-rows: minmax(90px, 12vw);
      gap: clamp(10px, 1.5vw, 16px);
    }

    .tile {
      position: relative;
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(135deg, var(--glass), transparent),
        rgba(0, 0, 0, 0.25);
      isolation: isolate;
    }

    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      border: 1px solid transparent;
      border-radius: inherit;
      pointer-events: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .tile::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.38)),
        repeating-linear-gradient(0deg, rgba(239, 241, 231, 0.07) 0 1px, transparent 1px 5px);
      opacity: 0.45;
      pointer-events: none;
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.74;
      filter: grayscale(0.35) saturate(0.92) contrast(1.2) brightness(0.72);
      transition: transform 320ms ease, opacity 180ms ease, filter 180ms ease;
    }

    .tile.playable {
      grid-column: 2 / span 3;
      grid-row: 1 / span 3;
      background: #050604;
      box-shadow: 0 26px 90px rgba(0, 0, 0, 0.38);
    }

    .tile.playable:hover,
    .tile.playable:focus-visible {
      outline: none;
    }

    .tile.playable:hover::before,
    .tile.playable:focus-visible::before {
      border-color: rgba(216, 255, 56, 0.78);
      box-shadow:
        inset 0 0 0 1px rgba(216, 255, 56, 0.16),
        0 0 36px rgba(216, 255, 56, 0.2);
      background: rgba(216, 255, 56, 0.035);
    }

    .tile.playable:hover img,
    .tile.playable:focus-visible img {
      transform: scale(1.03);
      opacity: 0.92;
      filter: grayscale(0.05) saturate(1.02) contrast(1.24) brightness(0.82);
    }

    .placeholder {
      display: grid;
      place-items: center;
    }

    .placeholder svg {
      width: min(52%, 82px);
      height: auto;
      opacity: 0.42;
    }

    .placeholder:nth-child(2) {
      grid-column: 1;
      grid-row: 1;
    }

    .placeholder:nth-child(3) {
      grid-column: 5;
      grid-row: 1;
    }

    .placeholder:nth-child(4) {
      grid-column: 1;
      grid-row: 2 / span 2;
    }

    .placeholder:nth-child(5) {
      grid-column: 5;
      grid-row: 2;
    }

    .placeholder:nth-child(6) {
      grid-column: 5;
      grid-row: 3;
    }

    .placeholder:nth-child(7) {
      grid-column: 2;
      grid-row: 4;
    }

    .placeholder:nth-child(8) {
      grid-column: 3;
      grid-row: 4;
    }

    .placeholder:nth-child(9) {
      grid-column: 4;
      grid-row: 4;
    }

    .pulse {
      position: fixed;
      left: 50%;
      top: 51%;
      width: min(88vmin, 840px);
      aspect-ratio: 1;
      border: 1px solid rgba(216, 255, 56, 0.14);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0.8;
    }

    .pulse::before,
    .pulse::after {
      content: "";
      position: absolute;
      inset: 16%;
      border: inherit;
      border-radius: inherit;
    }

    .pulse::after {
      inset: 31%;
      border-color: rgba(192, 50, 33, 0.22);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 780px) {
      body {
        overflow: auto;
      }

      .site {
        min-height: 100svh;
      }

      .masthead {
        justify-content: center;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: minmax(92px, 26vw);
      }

      .tile.playable {
        grid-column: 1 / span 2;
        grid-row: 1 / span 3;
      }

      .placeholder:nth-child(n) {
        grid-column: auto;
        grid-row: auto;
      }
    }
  </style>
</head>
<body>
  <main class="site">
    <header class="masthead">
      <a class="identity" href="./" aria-label="Signal home">
        <img class="logo" src="assets/signal-logo.svg" alt="">
        <h1 class="wordmark">Signal</h1>
      </a>
    </header>

    <section class="field" aria-label="Signal games">
      <div class="pulse" aria-hidden="true"></div>
      <div class="grid">
        <a class="tile playable" href="games/capital/" aria-label="Capital">
          <img src="assets/capital-tile.svg" alt="">
          <span class="sr-only">Capital</span>
        </a>

        <div class="tile placeholder" aria-hidden="true">
          <svg viewBox="0 0 80 80" role="img">
            <path d="M13 49 41 12l26 37-17 19H28Z" fill="none" stroke="var(--steel)" stroke-width="4"/>
            <path d="M30 48h21M36 58h9" stroke="var(--signal)" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="tile placeholder" aria-hidden="true">
          <svg viewBox="0 0 80 80" role="img">
            <circle cx="40" cy="40" r="24" fill="none" stroke="var(--steel)" stroke-width="4"/>
            <path d="M40 18v44M18 40h44" stroke="var(--warn)" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="tile placeholder" aria-hidden="true">
          <svg viewBox="0 0 80 80" role="img">
            <path d="M20 20h40v40H20z" fill="none" stroke="var(--steel)" stroke-width="4"/>
            <path d="M28 40h24M40 28v24" stroke="var(--signal)" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="tile placeholder" aria-hidden="true">
          <svg viewBox="0 0 80 80" role="img">
            <path d="M15 54c11-21 39-21 50 0" fill="none" stroke="var(--steel)" stroke-width="4"/>
            <circle cx="40" cy="42" r="8" fill="none" stroke="var(--signal)" stroke-width="4"/>
          </svg>
        </div>
        <div class="tile placeholder" aria-hidden="true">
          <svg viewBox="0 0 80 80" role="img">
            <path d="M24 56 56 24M24 24l32 32" stroke="var(--steel)" stroke-width="4" stroke-linecap="round"/>
            <circle cx="40" cy="40" r="27" fill="none" stroke="var(--warn)" stroke-width="4"/>
          </svg>
        </div>
        <div class="tile placeholder" aria-hidden="true">
          <svg viewBox="0 0 80 80" role="img">
            <path d="M40 13v54M18 31h44M24 49h32" stroke="var(--steel)" stroke-width="4" stroke-linecap="round"/>
            <path d="M31 22h18" stroke="var(--signal)" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="tile placeholder" aria-hidden="true">
          <svg viewBox="0 0 80 80" role="img">
            <path d="M20 58 40 16l20 42" fill="none" stroke="var(--steel)" stroke-width="4" stroke-linejoin="round"/>
            <path d="M32 44h16" stroke="var(--warn)" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="tile placeholder" aria-hidden="true">
          <svg viewBox="0 0 80 80" role="img">
            <path d="M18 24h44v32H18z" fill="none" stroke="var(--steel)" stroke-width="4"/>
            <path d="M27 34h26M27 46h15" stroke="var(--signal)" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
