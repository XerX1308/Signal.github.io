<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal</title>
  <meta name="description" content="Signal.">
  <meta property="og:title" content="Signal">
  <meta property="og:description" content="Signal.">
  <style>
    :root {
      --bg: #0b0d0a;
      --bg-soft: #11150f;
      --ink: #eff2e7;
      --signal: #d9ff3f;
      --red: #b63a2d;
      --line: rgba(239, 242, 231, 0.12);
      --line-strong: rgba(217, 255, 63, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      scroll-snap-type: y mandatory;
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      overflow-y: auto;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      background:
        linear-gradient(180deg, rgba(217, 255, 63, 0.055), transparent 34rem),
        linear-gradient(135deg, #151910 0%, var(--bg) 54%, #050604 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.24;
      background:
        linear-gradient(90deg, rgba(239, 242, 231, 0.055) 1px, transparent 1px),
        linear-gradient(180deg, rgba(239, 242, 231, 0.035) 1px, transparent 1px);
      background-size: 72px 72px;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        180deg,
        rgba(239, 242, 231, 0.035) 0,
        rgba(239, 242, 231, 0.035) 1px,
        transparent 1px,
        transparent 7px
      );
      opacity: 0.22;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .slide {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: grid;
      place-items: center;
      scroll-snap-align: start;
      padding: clamp(24px, 6vw, 72px);
    }

    .identity {
      display: inline-flex;
      align-items: center;
      gap: clamp(14px, 2.2vw, 28px);
      transform: translateY(-4vh);
    }

    .mark {
      width: clamp(58px, 9vw, 112px);
      height: clamp(58px, 9vw, 112px);
      filter: drop-shadow(0 0 28px rgba(217, 255, 63, 0.16));
      flex: 0 0 auto;
    }

    .wordmark {
      margin: 0;
      font-size: clamp(3rem, 10vw, 9rem);
      line-height: 0.88;
      font-weight: 900;
      letter-spacing: 0;
    }

    .catalog {
      width: min(860px, 78vw);
      aspect-ratio: 16 / 9;
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #050604;
      box-shadow: 0 34px 120px rgba(0, 0, 0, 0.42);
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 220ms ease;
    }

    .catalog svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .catalog:hover,
    .catalog:focus-visible {
      outline: none;
      border-color: var(--line-strong);
      box-shadow: 0 34px 140px rgba(0, 0, 0, 0.5), 0 0 42px rgba(217, 255, 63, 0.12);
      transform: translateY(-3px);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 720px) {
      .identity {
        display: grid;
        justify-items: center;
      }

      .catalog {
        width: min(92vw, 860px);
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="slide" aria-label="Signal">
      <a class="identity" href="./" aria-label="Signal">
        <svg class="mark" viewBox="0 0 96 96" role="img" aria-hidden="true">
          <rect x="8" y="8" width="80" height="80" rx="18" fill="#0b0d0a" stroke="rgba(239,242,231,.2)" stroke-width="2"/>
          <path d="M29 25h30l10 10v30H29z" fill="none" stroke="#eff2e7" stroke-width="5" stroke-linejoin="round"/>
          <path d="M59 25v12h12" fill="none" stroke="#eff2e7" stroke-width="5" stroke-linejoin="round"/>
          <path d="M24 69 72 27" stroke="#b63a2d" stroke-width="7" stroke-linecap="round"/>
          <path d="M34 58h8M48 58h8M62 58h1" stroke="#d9ff3f" stroke-width="5" stroke-linecap="round"/>
          <path d="M35 39h17M35 48h24" stroke="#5f6d69" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <h1 class="wordmark">Signal</h1>
      </a>
    </section>

    <section class="slide" aria-label="Catalog">
      <a class="catalog" href="./capital.html" aria-label="Capital">
        <svg viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid slice" role="img" aria-hidden="true">
          <defs>
            <linearGradient id="cardBg" x1="0%" x2="100%" y1="0%" y2="100%">
              <stop offset="0%" stop-color="#11170f"/>
              <stop offset="52%" stop-color="#050604"/>
              <stop offset="100%" stop-color="#141712"/>
            </linearGradient>
            <linearGradient id="redSlash" x1="0%" x2="100%" y1="100%" y2="0%">
              <stop offset="0%" stop-color="#7f241d"/>
              <stop offset="100%" stop-color="#c94434"/>
            </linearGradient>
            <pattern id="scan" width="1" height="9" patternUnits="userSpaceOnUse">
              <rect width="1" height="1" fill="#eff2e7" opacity=".12"/>
            </pattern>
          </defs>
          <rect width="1200" height="675" fill="url(#cardBg)"/>
          <rect width="1200" height="675" fill="url(#scan)" opacity=".5"/>
          <g stroke="#eff2e7" stroke-width="2" opacity=".12">
            <path d="M130 130h940M130 248h940M130 366h940M130 484h940"/>
            <path d="M220 86v512M420 86v512M620 86v512M820 86v512M1020 86v512"/>
          </g>
          <g transform="translate(250 160)">
            <path d="M0 62 78 0h544l78 62v236l-78 62H78L0 298Z" fill="none" stroke="#d9ff3f" stroke-width="7" opacity=".74"/>
            <path d="M52 98h596v164H52z" fill="none" stroke="#d9ff3f" stroke-width="2" opacity=".28"/>
            <path d="M122 100v162M578 100v162" stroke="#5f6d69" stroke-width="7" opacity=".58"/>
            <path d="M205 144h96M399 144h96M205 216h96M399 216h96" stroke="#d9ff3f" stroke-width="8" stroke-linecap="round" opacity=".56"/>
            <path d="M320 116h60l42 64-42 64h-60l-42-64Z" fill="none" stroke="#d9ff3f" stroke-width="8" opacity=".7"/>
            <path d="M78 290c144-82 252-44 355-113 84-56 151-61 230-36" fill="none" stroke="#b63a2d" stroke-width="13" stroke-linecap="round"/>
          </g>
          <path d="M104 590 1096 94" stroke="url(#redSlash)" stroke-width="12" stroke-linecap="round" opacity=".82"/>
          <rect x="0" y="0" width="1200" height="675" fill="none" stroke="#eff2e7" stroke-width="2" opacity=".16"/>
        </svg>
        <span class="sr-only">Capital</span>
      </a>
    </section>
  </main>
</body>
</html>
